services:
  humbler-ui:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persists the humble-cli session key across container restarts.
      # Uses a distinct directory to avoid conflict with Rails' config/ folder.
      - ./humbler-config:/config
      # Where downloaded bundles are stored
      - ./downloads:/downloads
    environment:
      # Optional: set HUMBLE_SESSION_KEY here to skip the web-based auth step.
      # The value of the _simpleauth_sess cookie from humblebundle.com.
      - HUMBLE_SESSION_KEY=${HUMBLE_SESSION_KEY:-}
      - DOWNLOAD_DIR=/downloads
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-}
    restart: unless-stopped
